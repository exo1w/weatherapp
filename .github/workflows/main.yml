name: Auth Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'weatherapp-microservices/auth/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t dockerle12/weatherapp-auth:${{ github.sha }} weatherapp-microservices/auth
        docker tag dockerle12/weatherapp-auth:${{ github.sha }} dockerle12/weatherapp-auth:latest

    - name: Push Docker Image
      run: |
        docker push dockerle12/weatherapp-auth:${{ github.sha }}
        docker push dockerle12/weatherapp-auth:latest

    - name: Setup Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    - name: Update Deployment Image
      run: |
        kubectl set image deployment/weatherapp-auth \
        weatherapp-auth=dockerle12/weatherapp-auth:${{ github.sha }}

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/weatherapp-auth
