apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weatherapp-auth-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: weatherapp-auth

  namespaceSelector:
    matchNames:
      - default

  endpoints:
    - port: http
      path: /metrics
      interval: 15s
