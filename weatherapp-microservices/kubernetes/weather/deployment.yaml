apiVersion: apps/v1
kind: Deployment
metadata:
  name: wheatherapp-weather
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: weatherapp-weather
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weatherapp-weather
    spec:
      restartPolicy: Always
      containers:
        - name: weatherapp-weather
          image: dockerle12/weatherapp-weather:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  key: APIKEY
                  name: weatherapi-secret
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
