<!DOCTYPE html>
<html lang="en">

<head>
    <title>Weather app by MRX-LOGIN</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
        integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu"
        crossorigin="anonymous">

    <!-- Bootstrap Theme -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap-theme.min.css"
        integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ"
        crossorigin="anonymous">

    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"
        integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
        crossorigin="anonymous"></script>

    <!-- ✅ Modern Login Style -->
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .page-header {
            border: none;
            margin-top: 40px;
        }

        .page-header h1 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .page-header small {
            color: #f1f1f1;
        }

        .form-signin {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .form-signin-heading {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
            font-size: 16px;
        }

        .form-control:focus {
            box-shadow: none !important;
            border-color: #00c6ff !important;
        }

        .btn-info {
            height: 50px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            transition: 0.3s ease;
        }

        .btn-info:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .alert-danger {
            background: rgba(255, 0, 0, 0.15);
            border: none;
            color: #ffdddd;
            border-radius: 10px;
        }

        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            text-decoration: none;
            color: #ffcc00;
        }

        img {
            vertical-align: middle;
        }
    </style>

</head>

<body>

    <div class="page-header text-center">
        <h1>
            <img src="logo.png" alt="Weather App" width="90px"
                style="-webkit-transform: scaleX(-1);transform: scaleX(-1)">
            Weather App
            <small>Sample application for practicing DevOps</small>
        </h1>
    </div>

    <div class="container-fluid">
        <form class="form-signin col-xs-8 col-xs-offset-2 col-sm-6 col-sm-offset-3 col-md-4 col-sm-offset-4 col-lg-2 col-lg-offset-5"
            method="post" action="/login">

            <h2 class="form-signin-heading">Please log in</h2>

            <label for="username" class="sr-only">User Name</label>
            <input type="username" id="username" name="username" class="form-control"
                placeholder="User Name" required autofocus>

            <div style="height: 10px"></div>

            <label for="inputPassword" class="sr-only">Password</label>
            <input type="password" id="inputPassword" class="form-control"
                name="password" placeholder="Password" required>

            <div style="height: 20px"></div>

            <button class="btn btn-lg btn-info btn-block" id="login" type="submit">
                Sign in
            </button>

        </form>
    </div>

    <div class="container">
        <div style="height: 20px"></div>
        <div class="alert alert-danger" id="loginresult" hidden role="alert"></div>

        <div class="col-xs-8 col-xs-offset-1 col-sm-5 col-sm-offset-2 col-md-3 col-sm-offset-3 col-lg-1 col-lg-offset-4">
            <div style="height: 20px"></div>
            <a href="/signup" style="font-size:20px; display: block; width: 200px">
                <img src="/signup.png" width="50px" style="display: inline" alt="">
                Signup
            </a>
        </div>
    </div>

    <script type="application/javascript" src="/login.js"></script>

</body>

</html>
